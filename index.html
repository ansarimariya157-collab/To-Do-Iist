<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <style>
        body{
    background-color: rgb(166, 127, 203);
}
.Container{
    width: 400px;
    padding: 40px;
    text-align: center;
    background-color: white;
    margin-left: 35%;
    margin-top: 5px;
}


input{
    width: 300px;
    padding: 6px;
    border:2px solid rgb(11, 14, 14);
    outline: none;
    font-size: 20px;
}


button{
    width: 70px;
    height: 40px;
    background-color: rgb(202, 166, 238);
    color:white;
    outline: none;
    border-radius: 3px;
    font-size: 20px;
}


.text ul{
    position: relative;
    background-color: rgb(187, 152, 219);
    color: white;
    font-size: 20px;
    padding: 10px;
    text-align: center;
}


.text ul i{
    position: absolute;
    right: 20px;
    cursor: pointer;
}




    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="Container">
    <h1>ToDo App</h1>
    <div class="inputs">
      <input type="text" placeholder="Enter Your Task" id="inp">
      <button onclick="Add()">Add</button>
    </div>
    <div class="text">
    </div>
  </div>


    <script>
    let inputs = document.getElementById("inp");
let text = document.querySelector(".text");


// LOAD TASKS FROM LOCAL STORAGE
showTask();


function Add() {
    if (inputs.value === "") {
        alert("Please Enter Task");
    } else {
        let newEle = document.createElement("ul");
        newEle.innerHTML = `${inputs.value} <i class="fa-solid fa-trash"></i>`;
        text.appendChild(newEle);


        // Clear input
        inputs.value = "";


        // Add delete button function
        newEle.querySelector("i").addEventListener("click", function () {
            newEle.remove();
            saveData();
        });


        // Save updated data
        saveData();
    }
}


function saveData() {
    localStorage.setItem("data", text.innerHTML);
}


function showTask() {
    let data = localStorage.getItem("data");
    if (data) {
        text.innerHTML = data;


        // Reconnect delete buttons after loading
        let deleteButtons = text.querySelectorAll("i");
        deleteButtons.forEach((btn) => {
            btn.addEventListener("click", function () {
                btn.parentElement.remove();
                saveData();
            });
        });
    }
}</script>
</body>
</html>
